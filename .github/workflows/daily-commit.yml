name: Daily commit bot

on:
  schedule:
    # Every day at 10:12 AM Philippine time
    - cron: "12 10 * * *"
      timezone: "Asia/Manila"

  # Lets you test it manually from the Actions tab
  workflow_dispatch:

# Allows the built-in GitHub token to push changes
permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Update generated file
        run: |
          mkdir -p bot
      
          printf "Last automatic update: %s\n" \
            "$(TZ=Asia/Manila date '+%Y-%m-%d %H:%M:%S %:z (Asia/Manila)')" \
            > bot/last-run.txt

      - name: Commit and push changes
        env:
          COMMIT_NAME: ${{ github.repository_owner }}
          COMMIT_EMAIL: "${{ github.repository_owner_id }}+${{ github.repository_owner }}@users.noreply.github.com"

        run: |
          git config user.name "$COMMIT_NAME"
          git config user.email "$COMMIT_EMAIL"

          git add bot/last-run.txt

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: daily automated update"

          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
