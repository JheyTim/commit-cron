name: Daily Commit Bot

on:
  schedule:
    # Every day at 10:00 PM Philippine time
    - cron: "40 0 * * *"
      timezone: "Asia/Manila"

  # Adds a button for manually testing the workflow
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update activity file
        run: |
          mkdir -p bot

          echo "Last automatic update: $(TZ=Asia/Manila date '+%Y-%m-%d %H:%M:%S') Asia/Manila" \
            > bot/last-run.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add bot/last-run.txt

          if git diff --cached --quiet; then
            echo "Nothing changed."
            exit 0
          fi

          git commit -m "chore: daily automated commit"
          git push
