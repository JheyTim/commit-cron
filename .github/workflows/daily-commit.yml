name: Daily commit bot

on:
  schedule:
    # Every day at 10:00 AM Philippine time
    - cron: "0 10 * * *"
      timezone: "Asia/Manila"

  # Lets you test it manually from the Actions tab
  workflow_dispatch:

# Allows the built-in GitHub token to push changes
permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Update generated file
        run: |
          mkdir -p bot
      
          printf "Last automatic update: %s\n" \
            "$(TZ=Asia/Manila date '+%Y-%m-%d %H:%M:%S %:z (Asia/Manila)')" \
            > bot/last-run.txt

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add bot/last-run.txt

          # Do not fail when there is nothing new to commit
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: daily automated update"

          # Incorporate any commits pushed while this job was running
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
